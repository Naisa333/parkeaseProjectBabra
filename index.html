<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Parkease — Login Page</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    :root {
      --brand: #1f4e79;
      --accent: #ffb800;
      --surface: rgba(210, 216, 228, 0.88);
      --text: #1b1818;
      --muted: #4b556d;
      --shadow: 0 18px 40px rgba(25, 40, 70, 0.18);
      --gradient-1: #0b1741;
      --gradient-2: #0c244a;
      --gradient-3: #122c54;
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    @keyframes float {
      0%,
      100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-6px);
      }
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #264181 0%, #1b3361 55%, #0c1f3c 100%);
      color: var(--text);
      overflow-x: hidden;
    }

    .card {
      width: clamp(320px, 420px, 480px);
      padding: 34px 28px;
      border-radius: 22px;
      background: var(--surface);
      box-shadow: var(--shadow);
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.18);
      backdrop-filter: blur(10px);
      animation: float 8s ease-in-out infinite;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .brand__logo {
      width: 50px;
      height: 50px;
      border-radius: 16px;
      background: radial-gradient(circle at 20% 20%, var(--accent), rgba(255, 184, 0, 0.14) 70%);
      display: grid;
      place-items: center;
      font-weight: 700;
      color: var(--brand);
      font-size: 1.2rem;
      box-shadow: inset 0 0 0 2px rgba(31, 78, 121, 0.24);
    }

    .brand__name {
      text-align: left;
    }

    .brand__name h1 {
      margin: 0;
      font-size: 1.35rem;
      letter-spacing: 0.8px;
      color: var(--brand);
    }

    .brand__name p {
      margin: 0.25rem 0 0;
      font-size: 0.87rem;
      color: var(--muted);
    }

    form {
      margin-top: 18px;
      text-align: left;
      display: grid;
      gap: 16px;
    }

    label {
      font-size: 0.85rem;
      color: var(--muted);
    }

    input {
      width: 100%;
      padding: 12px 14px;
      font-size: 1rem;
      border: 1px solid rgba(22, 30, 43, 0.2);
      border-radius: 12px;
      background: #c0c6e2;
      outline: none;
      transition: border-color 120ms ease, box-shadow 120ms ease;
    }

    input:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(31, 78, 121, 0.18);
    }

    .actions {
      margin-top: 6px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    button {
      width: 100%;
      padding: 12px 14px;
      border: none;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--brand), var(--brand-2));
      color: rgb(29, 28, 28);
      font-weight: 600;
      cursor: pointer;
      transition: transform 140ms ease, box-shadow 140ms ease, filter 140ms ease;
      box-shadow: 0 14px 25px rgba(25, 40, 70, 0.18);
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 28px rgba(25, 40, 70, 0.3);
      filter: brightness(1.05);
    }

    button:active {
      transform: translateY(0);
    }

    .pageTitle {
      margin: 0;
      margin-top: 12px;
      font-size: 1.1rem;
      color: var(--brand);
      letter-spacing: 0.4px;
    }

    .hint {
      font-size: 0.8rem;
      color: var(--muted);
      text-align: center;
      padding-top: 10px;
    }

    .error {
      padding: 12px 14px;
      border-radius: 12px;
      background: rgba(255, 50, 50, 0.1);
      border: 1px solid rgba(255, 50, 50, 0.25);
      color: #aa1f1f;
      font-weight: 600;
      display: none;
    }

    .error.show {
      display: block;
    }

    @media (max-width: 420px) {
      body {
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <main class="card" aria-label="Parkease login">
    <div class="brand">
      <div class="brand__logo" aria-hidden="true">P</div>
      <div class="brand__name">
        <h1>Parkease</h1>
        <p>Parking management &amp; vehicle services</p>
      </div>
    </div>

    <h2 class="pageTitle">Login Page</h2>

    <div id="error" class="error" role="alert"></div>

    <form id="loginForm" autocomplete="off">
      <div>
        <label for="username">Username</label>
        <input id="username" name="username" type="text" required autofocus autocomplete="username" />
      </div>
      <div>
        <label for="password">Password</label>
        <input id="password" name="password" type="password" required autocomplete="current-password" />
      </div>
      <div class="actions">
        <button type="submit">Sign in</button>
      </div>
    </form>

    <p class="hint">Try <strong>admin/admin123</strong> or <strong>attendant/park2026</strong></p>
    <p class="hint">New to Parkease? <a href="register.html" style="color: var(--brand); text-decoration: underline;">Register a vehicle</a></p>
  </main>

  <script src="auth.js"></script>
</body>
</html>
